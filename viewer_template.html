<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D OBJ Viewer</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f0f2f6;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="button-container" style="position: fixed; top: 10px; right: 10px; z-index: 100; display: flex; gap: 8px;">
        <button id="download-btn" style="
            padding: 10px 15px;
            background-color: #1f77b4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        ">📥 Download OBJ</button>
        <button id="screenshot-btn" style="
            padding: 10px 15px;
            background-color: #1f77b4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        ">📸 Screenshot</button>
    </div>
    <style>
        #button-container { position: fixed; top: 10px; right: 10px; z-index: 100; display: flex; gap: 8px; }
        #download-btn:hover, #screenshot-btn:hover { background-color: #155a96; }
    </style>

    <script>
        const container = document.getElementById('canvas-container');
        
        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f2f6);

        // Camera Setup
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.up.set(-1, 0, 0);
        camera.position.set(200, 200, 300);

        // Renderer Setup
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio || 1);
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);
        
        // Ensure correct initial size after iframe load
        function updateRendererSize() {
            const rect = container.getBoundingClientRect();
            renderer.setSize(rect.width, rect.height);
            camera.aspect = rect.width / rect.height;
            camera.updateProjectionMatrix();
        }
        updateRendererSize();

        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Ambient light
        // Soft ambient light
        const ambientLight = new THREE.AmbientLight(
            0xffffff,
            0.25
        );
        scene.add(ambientLight);

        // Diagonal key light (front-right-top)
        const keyLight1 = new THREE.DirectionalLight(
            0xffffff,
            1.0
        );
        keyLight1.position.set(4, 3, 5);
        scene.add(keyLight1);

        // Diagonal key light (front-left-top)
        const keyLight2 = new THREE.DirectionalLight(
            0xffffff,
            0.8
        );
        keyLight2.position.set(-4, 3, 4);
        scene.add(keyLight2);

        // Diagonal fill light (rear-right-bottom)
        const fillLight1 = new THREE.DirectionalLight(
            0xffffff,
            0.6
        );
        fillLight1.position.set(3, -4, -2);
        scene.add(fillLight1);

        // Diagonal fill light (rear-left-bottom)
        const fillLight2 = new THREE.DirectionalLight(
            0xffffff,
            0.5
        );
        fillLight2.position.set(-3, -2, -4);
        scene.add(fillLight2);

        // Rim light
        const rimLight = new THREE.DirectionalLight(
            0xffffff,
            0.4
        );
        rimLight.position.set(0, 5, -5);
        scene.add(rimLight);

        // Load OBJ Data (Injected by Python as Base64)
        const b64Data = `{{obj_data}}`;
        const objFilename = "{{obj_filename}}";
        const objText = atob(b64Data);
        
        const loader = new THREE.OBJLoader();
        const object = loader.parse(objText);

        // Apply material
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x1f77b4, 
            roughness: 0.4,
            metalness: 0.2,
            side: THREE.DoubleSide
        });
        
        object.traverse(function (child) {
            if (child.isMesh) {
                child.material = material;
            }
        });

        // Center the object
        const box = new THREE.Box3().setFromObject(object);
        const center = box.getCenter(new THREE.Vector3());
        object.position.sub(center);
        scene.add(object);

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            const rect = container.getBoundingClientRect();
            camera.aspect = rect.width / rect.height;
            camera.updateProjectionMatrix();
            renderer.setSize(rect.width, rect.height);
        }

        // Download OBJ functionality
        document.getElementById('download-btn').addEventListener('click', function() {
            const objData = atob(b64Data);
            const blob = new Blob([objData], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = objFilename || 'logo.obj';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        });

        // Screenshot functionality
        document.getElementById('screenshot-btn').addEventListener('click', function() {
            // Render one more frame to ensure the current state is captured
            renderer.render(scene, camera);
            
            // Get canvas data as PNG
            const imageData = renderer.domElement.toDataURL('image/png');
            
            // Create a temporary link and trigger download
            const link = document.createElement('a');
            link.href = imageData;
            link.download = 'logo_3d.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
